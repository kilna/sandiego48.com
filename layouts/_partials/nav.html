<style>
nav.main {
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  padding: 0.75em;
  margin: 0;
  background-color: var(--48-purple);
  background: radial-gradient(
    circle at center,
    var(--48-purple-dark) 0%,
    var(--48-purple-dark) 50%,
    var(--48-black) 100%
  );
}

nav.main a.button {
  margin: 0.125em 0.25em;
  border: 0.1em solid var(--48-purple);
}

nav.main a.button:hover {
  background: var(--48-white);
  border-color: var(--48-orange-light);
  box-shadow: 0 0 0.25em 0.25em var(--48-orange-trans);
}


@keyframes nav-button-throb {
  0% { 
    border-color: var(--48-purple); 
    box-shadow: 0 0 0.1em 0.1em var(--48-trans);
    transform: scale(1);
  }
  50% { 
    border-color: var(--48-orange); 
    box-shadow: 0 0 0.25em 0.25em var(--48-orange-trans-less);
    transform: scale(1.02);
  }
  100% { 
    border-color: var(--48-purple); 
    box-shadow: 0 0 0.1em 0.1em var(--48-trans);
    transform: scale(1);
  }
}

nav.main a.button.highlight {
  animation: nav-button-throb 2s ease-in-out infinite;
}

nav.main a.button.highlight:hover {
  animation: none;
}



</style>

<nav class="main">
  {{ range .Site.Menus.main -}}
  {{ partial "components/button.html" (dict
    "url" .URL
    "text" .Name
    "class" .Params.class
    "target" .Params.target
    "icon" .Params.icon
    "icon_position" "right"
  ) -}}
  {{- end }}
</nav>
