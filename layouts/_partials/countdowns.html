{{ if and (isset .Site.Params "countdowns") (gt (len .Site.Params.countdowns) 0) -}}
<style>
div.countdowns {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0;
  color: var(--48-orange);
  background: radial-gradient(
    ellipse at bottom,
    var(--48-purple-dark) 0%,
    var(--48-black) 100%
  );
  font-weight: 600;
}
div.countdowns .countdown {
  margin: 0.125em;
  padding: 0.25em;
}
@keyframes countdown-button-highlight {
  0%   { background-color: var(--48-orange); }
  30%  { background-color: var(--48-purple-light); }
  70% { background-color: var(--48-orange); }
  100% { background-color: var(--48-orange); }
}
div.countdowns a.button {
  color: var(--48-black);
  background-color: var(--48-orange);
  border: 3px solid var(--48-black);
  border-radius: 0.5em;
  margin: 0.5em;
  animation-name: countdown-button-highlight;
  animation-duration: 3s;
  animation-iteration-count: infinite;
  animation-timing-function: ease-in-out;
}
div.countdowns a.button:hover {
  box-shadow: inset 0 0 0 3px var(--48-purple);
  animation-duration: 1s;
}
div.countdowns .countdown-button {
  display: inline-block;
  text-align: center;
}
@media (max-width: 768px) {
  div.countdowns .countdown-button {
    display: block;
  }
}
</style>
<div class="countdowns">
{{ range .Site.Params.countdowns -}}
{{ partial "components/countdown.html" . -}}
{{ end -}}
</div>
{{ end -}}
