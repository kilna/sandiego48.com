outputs:
  page: ["HTML", "plain", "simple"]
  home: ["HTML"]
  section: ["HTML"]
  taxonomy: ["HTML"]
  term: ["HTML"]

outputFormats:
  plain:
    mediaType: "text/plain"
    baseName: "plain"
    isPlainText: true
    permalinkable: false
  simple:
    mediaType: "text/html"
    baseName: "simple"
    isPlainText: false
    permalinkable: false

mediaTypes:
  "text/plain":
    suffixes: ["txt"]

menus:
  main:
  - identifier: events
    weight: 1
    name: Events
    url: /events
    params:
      target: _self
      icon: calendar
  - identifier: about
    weight: 3
    name: About
    url: /#about
    params:
      target: _self
      icon: question
  - identifier: get-started
    weight: 4
    name: Get Started
    url: /#get-started
    params:
      target: _self
      icon: star
  - identifier: subscribe
    weight: 5
    name: Subscribe to Newsletter
    url: /go/newsletter
    params:
      target: _blank
      class: "glow pulse"
  - identifier: people
    weight: 9
    name: SD 48 Talent
    url: /people
    params:
      target: _self
      icon: director
