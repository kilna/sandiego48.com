      photo:
        name: "Event Photos"
        prefix: "photo-"
        padding: 3
        extension: "jpg"
        thumb_sizes: [128, 256]
        credit: "Photos courtesy of Photographer Name"
        credit_url: "https://photographer-website.com"
        alternate: "Can't find your picture? Check other events!"
        alternate_url: "/events/"
    films:
      poster:
        name: "Posters"
        padding: 3
        extension: "jpg"
        thumb_size: 320
      still:
        name: "Film Stills"
        padding: 3
        extension: "jpg"
        thumb_size: 200
      bts:
        name: "Behind the Scenes"
        padding: 3
        extension: "jpg"
        thumb_size: 200
      group:
        name: "Group Photos"
        padding: 3
        extension: "jpg"
        thumb_size: 200
    people:
      gallery:
        name: "Photo Gallery"
        prefix: "image-"
        padding: 3
        extension: "jpg"
        thumb_size: 256
  registration:
    early:
      start: "2026-06-08T00:00:00-07:00"
      end: "2026-08-04T23:59:59-07:00"
      price: 158
    regular:
      start: "2026-08-05T00:00:00-07:00"
      end: "2026-08-17T23:59:59-07:00"
      price: 178
    late:
      start: "2026-08-18T00:00:00-07:00"
      end: "2026-08-28T19:00:00-07:00"
      price: 198
  countdowns:
    - default: "Not long"
      suffix: "until registration opens on June 8"
      date: "2026-06-08T00:00:00-07:00"
    - default: "Not long"
      suffix: "to Kickoff on August 28"
      date: "2026-08-28T19:00:00-07:00"
