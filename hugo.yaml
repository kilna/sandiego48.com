baseURL: https://sandiego48.com
title: San Diego 48 Hour Film Project
languageCode: en-us

# Modern Hugo Configuration
enableGitInfo: true
enableRobotsTXT: true
enableEmoji: true

# Performance optimizations
timeout: "30s"
enableInlineShortcodes: true

# Asset processing
imaging:
  resampleFilter: "CatmullRom"
  quality: 85
  anchor: "Smart"

# Markup configuration
markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      attribute:
        block: true
  highlight:
    style: "github"
    lineNos: false
    tabWidth: 2

params:
  description: "San Diego 48 Hour Film Project - Make a film in 48 hours!"
  author: "Kilna, Anthony"
  header_bg: header_bg.jpg
  logo: logo_trans_glow.png
  facebook: sd48hfp
  twitter: sd48hfp
  instagram: sd48hfp
  tiktok: sd48hfp
  threads: sd48hfp
  youtube: sd48hfp
  facebook_group: sandiego48hfp
  discord_server: San Diego 48 Hour Film Project
  discord_server_invite: https://discord.gg/hMMTY5PSXD
  site_link_text: SanDiego48.com
  email: sandiego@48hourfilm.com
  phone: +1-619-48-321-48
  phone_can_text: true
  copyright: Cine Diego LLC
  copyright_url: https://cinediego.com
  countdowns:
    - default: "A while to go"
      suffix: "until this year's competition... Prices go up soon!"
      date: "2025-08-15T19:00:00-07:00"
      show_after: "2025-06-09T00:00:00-07:00"
      show_before: "2025-07-22T00:00:00-07:00"
      button:
        text: "Register Your Team Now!"
        url: /go/register
        icon: register
    - default: "Not long"
      suffix: "left for early bird registration!"
      date: "2025-07-22T00:00:00-07:00"
      show_after: "2025-07-10T00:00:00-07:00"
      show_before: "2025-07-22T00:00:00-07:00"
      button:
        text: "Register Your Team Now!"
        url: /go/register
        icon: register
    - default: "Not long"
      suffix: "until late registration price increase!"
      date: "2025-08-05T00:00:00-07:00"
      show_after: "2025-07-22T00:00:00-07:00"
      show_before: "2025-08-05T00:00:00-07:00"
      button:
        text: "Register Your Team Now!"
        url: /go/register
        icon: register
outputs:
  page: ["HTML", "plain", "simple"]
  home: ["HTML"]
  section: ["HTML"]
  taxonomy: ["HTML"]
  term: ["HTML"]

outputFormats:
  plain:
    mediaType: "text/plain"
    baseName: "plain"
    isPlainText: true
    permalinkable: false
  simple:
    mediaType: "text/html"
    baseName: "simple"
    isPlainText: false
    permalinkable: false

mediaTypes:
  "text/plain":
    suffixes: ["txt"]

menus:
  main:
  - identifier: events
    weight: 1
    name: Events
    url: /events
  - identifier: sponsors
    weight: 2
    name: Sponsors
    url: /sponsors
  - identifier: subscribe
    weight: 5
    name: Subscribe to Newsletter
    url: /go/newsletter
    params:
      target: _blank
