    #   button:
    #     text: "Buy Tickets!"
    #     url: /go/tickets
    #     icon: ticket
    #     icon_position: right
outputs:
  page: ["HTML", "plain", "simple"]
  home: ["HTML"]
  section: ["HTML"]
  taxonomy: ["HTML"]
  term: ["HTML"]

outputFormats:
  plain:
    mediaType: "text/plain"
    baseName: "plain"
    isPlainText: true
    permalinkable: false
  simple:
    mediaType: "text/html"
    baseName: "simple"
    isPlainText: false
    permalinkable: false

mediaTypes:
  "text/plain":
    suffixes: ["txt"]
